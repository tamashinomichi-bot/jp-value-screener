<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>作業証明書</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root {
    --bg: #f0f2f5; --card: #fff; --primary: #1a56db; --primary-dark: #1e429f;
    --accent: #f59e0b; --text: #111827; --text-sub: #6b7280; --border: #e5e7eb;
    --success: #10b981; --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }
  header { background: var(--primary); color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(26,86,219,0.3); }
  header .icon { font-size: 22px; }
  header h1 { font-size: 17px; font-weight: 700; }
  header .company { font-size: 11px; opacity: 0.8; margin-top: 2px; }
  header .tel-info { margin-left: auto; text-align: right; font-size: 10px; opacity: 0.85; line-height: 1.5; }
  .steps { display: flex; background: var(--primary-dark); padding: 8px 20px; }
  .step { flex: 1; text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 500; padding: 4px 0; border-bottom: 2px solid transparent; transition: all 0.3s; }
  .step.active { color: white; border-bottom-color: var(--accent); }
  main { padding: 14px; max-width: 600px; margin: 0 auto; }
  .card { background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
  input[type=text], input[type=number], input[type=time], input[type=date], textarea, select {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 16px; font-family: 'Noto Sans JP', sans-serif; color: var(--text); background: white;
    transition: border-color 0.2s; -webkit-appearance: none; appearance: none;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
  textarea { resize: vertical; min-height: 80px; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .weather-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .weather-btn { flex: 1; min-width: 60px; padding: 10px 6px; border: 1.5px solid var(--border); border-radius: 8px; background: white; text-align: center; font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif; }
  .weather-btn .emoji { display: block; font-size: 22px; margin-bottom: 2px; }
  .weather-btn.selected { border-color: var(--primary); background: #eff6ff; color: var(--primary); font-weight: 600; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--primary); color: white; padding: 6px 12px; border-radius: 99px; font-size: 13px; font-weight: 600; }
  .tag-x { cursor: pointer; font-size: 18px; line-height: 1; margin-left: 2px; }
  .tags-area { display: flex; flex-wrap: wrap; gap: 6px; min-height: 20px; margin-top: 8px; }
  #signatureCanvas { width: 100%; height: 160px; border: 2px dashed var(--border); border-radius: 8px; background: #fafafa; touch-action: none; cursor: crosshair; display: block; }
  #signatureCanvas.signed { border-color: var(--success); border-style: solid; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:active { background: var(--primary-dark); }
  .btn-secondary { background: white; color: var(--text); border: 1.5px solid var(--border); font-size: 14px; padding: 10px; }
  .btn-success { background: var(--success); color: white; }
  .btn-accent { background: var(--accent); color: white; }
  .page { display: none; }
  .page.active { display: block; }
  .confirm-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-label { color: var(--text-sub); width: 110px; flex-shrink: 0; font-size: 13px; }
  .confirm-value { font-weight: 500; flex: 1; }
  .complete-icon { font-size: 64px; text-align: center; margin: 20px 0 10px; }
  .complete-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .complete-sub { text-align: center; color: var(--text-sub); font-size: 14px; margin-bottom: 24px; }
  .sig-preview { width: 100%; height: 80px; object-fit: contain; border: 1px solid var(--border); border-radius: 8px; background: white; }
  .other-input-row { display: none; gap: 8px; margin-top: 8px; }
  .other-input-row input { flex: 1; }
  .other-input-row button { padding: 10px 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; white-space: nowrap; cursor: pointer; }
  .length-display { font-size: 24px; font-weight: 700; color: var(--primary); min-width: 60px; text-align: center; }
  input[type=range] { flex: 1; height: 6px; accent-color: var(--primary); }
</style>
</head>

      <label id="subTypeLabel">規格</label>
      <div class="weather-group" id="subTypeGroup"></div>
    </div>

    <div class="form-group">
      <label>長さ L(m) *</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="range" id="lengthSlider" min="2" max="100" value="20" step="1" oninput="updateLength()">
        <span class="length-display" id="lengthVal">10.0</span>
        <span style="font-size:14px;color:var(--text-sub);">m</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-sub);margin-top:4px;">
        <span>1.0m</span><span>25.0m</span><span>50.0m</span>
      </div>
    </div>

    <div class="form-group">
      <label>枚数・本数 *</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="range" id="countSlider" min="1" max="200" value="1" step="1" oninput="updateCount()" style="flex:1;height:6px;accent-color:var(--primary);">
        <span class="length-display" id="countVal">1</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-sub);margin-top:4px;">
        <span>1</span><span>100</span><span>200</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:15px;font-weight:500;cursor:pointer;">
          <input type="radio" name="countUnit" value="枚" onchange="updateWork()" checked style="width:18px;height:18px;accent-color:var(--primary);"> 枚
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:15px;font-weight:500;cursor:pointer;">
          <input type="radio" name="countUnit" value="本" onchange="updateWork()" style="width:18px;height:18px;accent-color:var(--primary);"> 本
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>作業内容（自動生成）</label>

        <label>開始時間 *</label>

      <div class="form-group">
        <label>終了時間 *</label>
        <input type="time" id="endTime" value="17:00">
      </div>
    </div>

    <div class="form-group">
      <label>作業者名（複数選択可）</label>
      <select id="workerSelect" onchange="addWorker(this)" style="font-size:16px;">
        <option value="">-- タップして追加 --</option>
        <option>アリ</option><option>ディオ</option><option>ディキ</option>
        <option>ヌルハミド</option><option>ヌルロヒム</option><option>ロマダニ</option>
        <option>ズキルマン</option><option>カリド</option><option>バフティアル</option>
        <option>ワフユ</option><option>大上マサシ</option>
        <option value="__other__">その他（手動入力）</option>

      <div class="other-input-row" id="otherWorkerRow">
        <input type="text" id="otherWorkerInput" placeholder="名前を入力">
        <button onclick="addOtherWorker()">追加</button>
      </div>
      <div class="tags-area" id="workerTags"></div>
      <input type="hidden" id="workerNames">
    </div>

    <div class="form-group">
      <label>作業員数</label>
      <input type="number" id="workerCount" placeholder="例：3" min="1" max="100" inputmode="numeric">
    </div>

    <div class="form-group">
      <label>オペレーター名</label>
      <select id="operator" onchange="handleOperator(this)" style="font-size:16px;">
        <option value="">-- 選択してください --</option>
        <option value="坂本">坂本</option>
        <option value="丸">丸</option>
        <option value="大上啓一">大上啓一</option>
        <option value="佐川道夫">佐川道夫</option>
        <option value="__other__">その他（手動入力）</option>
      </select>
      <input type="hidden" id="operatorName">
      <div id="operatorOther" style="display:none;margin-top:8px;">
        <input type="text" id="operatorOtherInput" placeholder="オペレーター名を入力" oninput="document.getElementById('operatorName').value=this.value">
      </div>

    <div class="form-group">
      <label>使用クレーン</label>
      <select id="crane" onchange="handleCrane(this)" style="font-size:16px;">

        <option value="25tラフタクレーン">25tラフタクレーン</option>
        <option value="35tラフタクレーン">35tラフタクレーン</option>
        <option value="50tラフタクレーン">50tラフタクレーン</option>
        <option value="50tテレスコクレーン">50tテレスコクレーン</option>
        <option value="75tテレスコクレーン">75tテレスコクレーン</option>
        <option value="70tクローラークレーン">70tクローラークレーン</option>
        <option value="__other__">その他（手動入力）</option>

      <div id="craneOther" style="display:none;margin-top:8px;">
        <input type="text" id="craneOtherInput" placeholder="クレーン名を入力" oninput="document.getElementById('craneName').value=this.value">

  </div>

  <div class="card">
    <div class="card-title">📝 備考</div>
    <div class="form-group">
      <textarea id="notes" placeholder="特記事項があれば入力してください" style="min-height:60px;"></textarea>

<!-- ページ2 -->
<div class="page" id="page2">

  </div>

</main>

<script>
// --- 状態管理 ---
let weather = '';
let workMethod = '';
let workSubType = '';
let workerList = [];
let sigData = '';
let reportData = {};

const subTypes = {
  'SP400': ['2型','3型','4型'],
  'SP500': ['5L','6L'],
  'NSP600': ['2W','3W','4W'],
  'SPハット型': ['10H','25H','45H','50H'],
  'ZERO': [],
  'その他': ['H鋼300','H鋼400']
};

// --- 初期化 ---
document.getElementById('date').value = new Date().toISOString().split('T')[0];

// --- 天気 ---
function selWeather(w, btn) {
  weather = w;
  document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// --- 工法 ---
function selMethod(m, btn) {
  workMethod = m;
  document.querySelectorAll('#page1 .card:nth-child(2) .weather-group:first-of-type .weather-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateWork();
}

// --- 職長 ---
function handleClient(sel) {
  if (sel.value === '__other__') {
    document.getElementById('clientOther').style.display = 'block';
    document.getElementById('clientName').value = '';
  } else {
    document.getElementById('clientOther').style.display = 'none';
    document.getElementById('clientName').value = sel.value;
  }
}

function handleForeman(sel) {
  if (sel.value === '__other__') {
    document.getElementById('foremanOther').style.display = 'block';
    document.getElementById('foremanName').value = '';
  } else {
    document.getElementById('foremanOther').style.display = 'none';
    document.getElementById('foremanName').value = sel.value;
  }
}

// --- 型選択 ---
function handleType(sel) {
  const t = sel.value;
  workSubType = '';
  const subs = subTypes[t] || [];
  const area = document.getElementById('subTypeArea');
  const group = document.getElementById('subTypeGroup');
  if (subs.length > 0) {
    area.style.display = 'block';
    document.getElementById('subTypeLabel').textContent = t + ' 規格';
    group.innerHTML = subs.map(s =>
      `<button class="weather-btn" onclick="selSub('${s}',this)">${s}</button>`
    ).join('');
  } else {
    area.style.display = 'none';
    updateWork();
  }
}

function selSub(s, btn) {
  workSubType = s;
  document.querySelectorAll('#subTypeGroup .weather-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateWork();
}

// --- 長さ ---
function updateLength() {
  const v = (document.getElementById('lengthSlider').value / 2).toFixed(1);
  document.getElementById('lengthVal').textContent = v;
  updateWork();
}

// --- 作業内容自動生成 ---
function updateCount() {
  document.getElementById('countVal').textContent = document.getElementById('countSlider').value;
  updateWork();
}

function updateWork() {
  const t = document.getElementById('typeSelect').value;
  const len = (document.getElementById('lengthSlider').value / 2).toFixed(1);
  const count = document.getElementById('countSlider').value;
  const unitEl = document.querySelector('input[name="countUnit"]:checked');
  const unit = unitEl ? unitEl.value : '枚';
  let parts = [];
  if (workMethod) parts.push(workMethod);
  if (t) {
    let ts = t;
    if (workSubType) ts += ' ' + workSubType;
    parts.push(ts);
  }
  parts.push('L=' + len + 'm');
  parts.push(count + unit);
  const text = parts.join(' / ');
  document.getElementById('workPreview').textContent = text || '工法・型・長さを選択すると自動生成されます';
  document.getElementById('workContent').value = text;
}

// --- 作業者 ---
function addWorker(sel) {
  const val = sel.value;
  sel.value = '';
  if (!val) return;
  if (val === '__other__') {
    document.getElementById('otherWorkerRow').style.display = 'flex';
    return;
  }
  if (!workerList.includes(val)) {
    workerList.push(val);
    renderTags();
  }
}

function addOtherWorker() {
  const input = document.getElementById('otherWorkerInput');
  const val = input.value.trim();
  if (val && !workerList.includes(val)) {
    workerList.push(val);
    renderTags();
    input.value = '';
    document.getElementById('otherWorkerRow').style.display = 'none';
  }
}

function removeWorker(name) {
  workerList = workerList.filter(n => n !== name);
  renderTags();
}

function renderTags() {
  const area = document.getElementById('workerTags');
  area.innerHTML = workerList.map(name =>
    '<span class="tag">' + name +
    '<span class="tag-x" onclick="removeWorker(\'' + name + '\')">×</span></span>'
  ).join('');
  document.getElementById('workerNames').value = workerList.join('、');
}

// --- 確認画面 ---
function goConfirm() {
  if (!document.getElementById('date').value) { alert('日付を入力してください'); return; }
  if (!weather) { alert('天気を選択してください'); return; }
  const fn = document.getElementById('foremanName').value;
  if (!fn) { alert('職長名を選択してください'); return; }
  if (!document.getElementById('siteName').value) { alert('作業現場名を入力してください'); return; }
  if (!document.getElementById('startTime').value) { alert('開始時間を入力してください'); return; }
  if (!document.getElementById('endTime').value) { alert('終了時間を入力してください'); return; }

  reportData = {
    date: document.getElementById('date').value,
    weather,
    clientName: document.getElementById('clientName').value || '—',
    foremanName: fn,
    siteName: document.getElementById('siteName').value,
    workContent: document.getElementById('workContent').value || '（未選択）',
    workExtra: document.getElementById('workExtra').value || '',
    startTime: document.getElementById('startTime').value,
    endTime: document.getElementById('endTime').value,
    workerNames: document.getElementById('workerNames').value || '—',
    workerCount: document.getElementById('workerCount').value || '—',
    operator: document.getElementById('operatorName').value || document.getElementById('operator').value || '—',
    crane: document.getElementById('craneName').value || document.getElementById('crane').value || '—',
    notes: document.getElementById('notes').value || '—',
  };

  document.getElementById('confirmContent').innerHTML = [
    ['日付', reportData.date],
    ['天気', reportData.weather],
    ['元請名', reportData.clientName],
    ['職長名', reportData.foremanName],
    ['作業現場名', reportData.siteName],
    ['作業内容', reportData.workContent],
    ...(reportData.workExtra ? [['作業内容（その他）', reportData.workExtra]] : []),
    ['作業時間', reportData.startTime + ' 〜 ' + reportData.endTime],
    ['作業者名', reportData.workerNames],
    ['作業員数', reportData.workerCount + '名'],
    ['オペレーター', reportData.operator],
    ['使用クレーン', reportData.crane],
    ['備考', reportData.notes],
  ].map(([l,v]) =>
    '<div class="confirm-row"><span class="confirm-label">' + l + '</span><span class="confirm-value">' + v + '</span></div>'
  ).join('');

  showPage(2);
}

// --- 署名 ---
let canvas, ctx, drawing = false;

function goSign() {
  showPage(3);
  canvas = document.getElementById('signatureCanvas');
  ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 160;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); canvas.classList.add('signed'); }, {passive:false});
  canvas.addEventListener('touchend', () => drawing = false);
  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); canvas.classList.add('signed'); });
  canvas.addEventListener('mouseup', () => drawing = false);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.width / rect.width;
  if (e.touches) return { x: (e.touches[0].clientX - rect.left) * scale, y: (e.touches[0].clientY - rect.top) * scale };
  return { x: (e.clientX - rect.left) * scale, y: (e.clientY - rect.top) * scale };
}

function clearSig() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  canvas.classList.remove('signed');
}

function complete() {
  sigData = canvas.toDataURL('image/png');
  document.getElementById('completeSub').textContent = reportData.date + ' / ' + reportData.siteName + ' / ' + reportData.foremanName;
  if (canvas.classList.contains('signed')) {
    document.getElementById('sigPreviewArea').innerHTML =
      '<p style="font-size:12px;color:var(--text-sub);margin-bottom:4px;">監督署名：</p><img src="' + sigData + '" class="sig-preview">';
  }
  showPage(4);
}

// --- PDF保存 ---

function shareToLine() {
  const d = reportData;
  const text = '【作業証明書】\n日付：' + d.date + '\n現場：' + d.siteName + '\n職長：' + d.foremanName + '\n作業内容：' + d.workContent + '\n時間：' + d.startTime + '〜' + d.endTime + '\n天気：' + d.weather;
  window.open('https://line.me/R/share?text=' + encodeURIComponent(text), '_blank');
}

function newReport() {
  weather = ''; workMethod = ''; workSubType = ''; workerList = []; sigData = ''; reportData = {};
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  document.getElementById('client').value = '';
  document.getElementById('clientName').value = '';
  document.getElementById('clientOther').style.display = 'none';
  document.getElementById('clientOtherInput').value = '';
  document.getElementById('foreman').value = '';
  document.getElementById('foremanName').value = '';
  document.getElementById('foremanOther').style.display = 'none';
  document.getElementById('foremanOtherInput').value = '';
  document.getElementById('siteName').value = '';
  document.getElementById('typeSelect').value = '';
  document.getElementById('subTypeArea').style.display = 'none';
  document.getElementById('lengthSlider').value = 20;
  document.getElementById('lengthVal').textContent = '10.0';
  document.getElementById('workPreview').textContent = '工法・型・長さを選択すると自動生成されます';
  document.getElementById('workContent').value = '';
  document.getElementById('workExtra').value = '';
  document.getElementById('countSlider').value = 1;
  document.getElementById('countVal').textContent = '1';
  const firstUnit = document.querySelector('input[name="countUnit"]');
  if (firstUnit) firstUnit.checked = true;
  document.getElementById('startTime').value = '08:00';
  document.getElementById('endTime').value = '17:00';
  document.getElementById('workerSelect').value = '';
  document.getElementById('workerTags').innerHTML = '';
  document.getElementById('workerNames').value = '';
  document.getElementById('otherWorkerRow').style.display = 'none';
  document.getElementById('otherWorkerInput').value = '';
  document.getElementById('workerCount').value = '';
  document.getElementById('operator').value = '';
  document.getElementById('operatorName').value = '';
  document.getElementById('operatorOther').style.display = 'none';
  document.getElementById('operatorOtherInput').value = '';
  document.getElementById('crane').value = '';
  document.getElementById('craneName').value = '';
  document.getElementById('craneOther').style.display = 'none';
  document.getElementById('craneOtherInput').value = '';
  document.getElementById('notes').value = '';
  document.querySelectorAll('.weather-btn').forEach(b => b.classList.remove('selected'));
  showPage(1);
}

function handleCrane(sel) {
  if (sel.value === '__other__') {
    document.getElementById('craneOther').style.display = 'block';
    document.getElementById('craneName').value = '';
  } else {
    document.getElementById('craneOther').style.display = 'none';
    document.getElementById('craneName').value = sel.value;
  }
}

function handleOperator(sel) {
  if (sel.value === '__other__') {
    document.getElementById('operatorOther').style.display = 'block';
    document.getElementById('operatorName').value = '';
  } else {
    document.getElementById('operatorOther').style.display = 'none';
    document.getElementById('operatorName').value = sel.value;
  }
}

function showPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + n).classList.add('active');
  document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('active', i < n));
  window.scrollTo(0, 0);
}
